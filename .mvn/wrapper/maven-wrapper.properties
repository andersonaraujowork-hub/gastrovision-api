wrapperVersion=3.3.4
distributionType=only-script
distributionUrl=https://repo.maven.apache.org/maven2/org/apache/maven/apache-maven/3.9.14/apache-maven-3.9.14-bin.zip

spring.application.name=gastrovision-api 

spring.datasource.url=jdbc:mysql://${MYSQL_HOST:localhost}:3306/db_gastrovision
spring.datasource.username=gastrovision
spring.datasource.password=gstdb2026
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Forcar o dialeto para evitar o erro de 'Unable to determine Dialect'
#JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

#  Swagger /
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# Servidor
server.port=${SERVER_PORT:8080}
server.servlet.context-path=/api/v1   
